version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ersus360
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ersus360@local
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:ersus360@local@db:5432/ersus360
      SECRET_KEY: ${SECRET_KEY:-ersus360-dev-secret-key-change-in-prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FNS_MUNICIPIO_IBGE: "1300144"
      FNS_SYNC_HORA: "06:00"
      MUNICIPIO_NOME: Apuí
      MUNICIPIO_UF: AM
      DEBUG: "false"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://frontend:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  # ── Frontend React/Vite ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
